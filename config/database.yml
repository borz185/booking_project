default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: your_app_name_development

test:
  <<: *default
  database: your_app_name_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>   # <--- ВАЖНО: эта строчка ДОЛЖНА БЫТЬ