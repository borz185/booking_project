version: "1"
services:
  - type: web
    name: booking-app
    runtime: ruby
    repo: https://github.com/borz185/booking_project
    branch: main
    plan: free
    region: frankfurt
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booking-app-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true   # Пусть Render сам сгенерирует
      - key: RAILS_MASTER_KEY
        generateValue: true